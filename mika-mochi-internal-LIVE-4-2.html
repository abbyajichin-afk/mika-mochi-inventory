function switchProdOrderTab(tab) { prodOrderTab = tab; renderProdOrder(); }

let _boothOrderCache = {};

async function toggleBoothOffDay(dayKey) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  if (!window._currentBoothOrder.offDays) window._currentBoothOrder.offDays = {};
  window._currentBoothOrder.offDays[dayKey] = !window._currentBoothOrder.offDays[dayKey];
  if (window._currentBoothWeek && window._currentBoothId) {
    await saveBoothOrder(window._currentBoothId, window._currentBoothWeek, window._currentBoothOrder);
  }
  renderProdOrder();
}

function switchDayTab(dayKey) {
  document.querySelectorAll('[id^="dayPanel_"]').forEach(p => p.style.display = 'none');
  document.querySelectorAll('[id^="dtab_"]').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('dayPanel_' + dayKey);
  const tab = document.getElementById('dtab_' + dayKey);
  if (panel) panel.style.display = 'block';
  if (tab) tab.classList.add('active');
}

function adjQty(elId, type, flavour, dayKey, delta) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const data = type === 'daifuku' ? window._currentBoothOrder.daifuku : window._currentBoothOrder.bites;
  if (!data[flavour]) data[flavour] = {};
  const cur = data[flavour][dayKey] !== undefined ? data[flavour][dayKey] : 5;
  const newVal = Math.max(0, cur + delta);
  data[flavour][dayKey] = newVal;
  const el = document.getElementById(elId);
  if (el) el.value = newVal;
  updateDayTotal(dayKey);
}

function setQtyDirect(elId, type, flavour, dayKey) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const data = type === 'daifuku' ? window._currentBoothOrder.daifuku : window._currentBoothOrder.bites;
  if (!data[flavour]) data[flavour] = {};
  const el = document.getElementById(elId);
  if (el) data[flavour][dayKey] = Math.max(0, parseInt(el.value) || 0);
  updateDayTotal(dayKey);
}

function updateDayTotal(dayKey) {
  if (!window._currentBoothOrder) return;
  const orderData = window._currentBoothOrder;
  let totalD = 0, totalB = 0;
  DAIFUKU_FLAVOURS.forEach(f => { if (isFlavourActive('daifuku', f.name)) totalD += (orderData.daifuku?.[f.name]?.[dayKey] ?? 5); });
  BITES_FLAVOURS.forEach(f => { if (isFlavourActive('bites', f.name)) totalB += (orderData.bites?.[f.name]?.[dayKey] ?? 5); });
  const elD = document.getElementById(`dtTotalD_${dayKey}`);
  const elB = document.getElementById(`dtTotalB_${dayKey}`);
  if (elD) elD.textContent = totalD;
  if (elB) elB.textContent = totalB;
}

function setDefaultQty() {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const weekDates = getWeekDatesInt(window._currentBoothWeek || getWeekStart());
  DAIFUKU_FLAVOURS.forEach(f => {
    if (!window._currentBoothOrder.daifuku[f.name]) window._currentBoothOrder.daifuku[f.name] = {};
    weekDates.forEach(({key}) => {
      if (!window._currentBoothOrder.offDays?.[key]) {
        window._currentBoothOrder.daifuku[f.name][key] = 5;
      }
    });
  });
  BITES_FLAVOURS.forEach(f => {
    if (!window._currentBoothOrder.bites[f.name]) window._currentBoothOrder.bites[f.name] = {};
    weekDates.forEach(({key}) => {
      if (!window._currentBoothOrder.offDays?.[key]) {
        window._currentBoothOrder.bites[f.name][key] = 5;
      }
    });
  });
  showToast('Default 5pcs diset untuk semua!', 'success');
  renderProdOrder();
}

function openCopyFromDateModal() {
  showModal('Copy dari Tarikh Lain', `
    <div class="form-group"><label class="form-label">Pilih Tarikh</label>
      <input class="form-input" id="cfd_date" type="date" value="${new Date(Date.now()-86400000).toISOString().split('T')[0]}">
    </div>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:12px;">System akan copy quantity dari tarikh yang dipilih ke semua hari dalam minggu semasa.</p>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-pink" onclick="copyFromDate()">Copy</button>
    </div>`);
}

async function copyFromDate() {
  const date = document.getElementById('cfd_date').value;
  if (!date) return showToast('Pilih tarikh', 'error');
  // Find which week this date belongs to
  const weekStart = getWeekStart(new Date(date + 'T00:00:00'));
  const dayOfWeek = new Date(date + 'T00:00:00').getDay();
  const dayKey = DELIVERY_DAYS_INT[dayOfWeek === 0 ? 6 : dayOfWeek - 1].key;
  // Load that booth's order for that week
  const sourceOrder = await loadBoothOrder(window._currentBoothId, weekStart);
  if (!sourceOrder) return showToast('Tiada order untuk tarikh ini', 'error');
  // Copy qty from that day to all active days in current week
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const weekDates = getWeekDatesInt(window._currentBoothWeek || getWeekStart());
  DAIFUKU_FLAVOURS.forEach(f => {
    const qty = sourceOrder.daifuku?.[f.name]?.[dayKey] ?? 5;
    if (!window._currentBoothOrder.daifuku[f.name]) window._currentBoothOrder.daifuku[f.name] = {};
    weekDates.forEach(({key}) => {
      if (!window._currentBoothOrder.offDays?.[key]) window._currentBoothOrder.daifuku[f.name][key] = qty;
    });
  });
  BITES_FLAVOURS.forEach(f => {
    const qty = sourceOrder.bites?.[f.name]?.[dayKey] ?? 5;
    if (!window._currentBoothOrder.bites[f.name]) window._currentBoothOrder.bites[f.name] = {};
    weekDates.forEach(({key}) => {
      if (!window._currentBoothOrder.offDays?.[key]) window._currentBoothOrder.bites[f.name][key] = qty;
    });
  });
  showToast('Order berjaya di-copy!', 'success');
  closeModal();
  renderProdOrder();
}

function changeBoothQty(type, flavour, dayKey, delta) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const data = type === 'daifuku' ? window._currentBoothOrder.daifuku : window._currentBoothOrder.bites;
  if (!data[flavour]) data[flavour] = {};
  const cur = data[flavour][dayKey] || 0;
  const newVal = Math.max(0, cur + delta);
  data[flavour][dayKey] = newVal;

  // Update display
  const sid = `q_${type==='daifuku'?'d':'b'}_${flavour.replace(/[^a-z0-9]/gi,'_')}_${dayKey}`;
  const el = document.getElementById(sid);
  if (el) el.textContent = newVal;

  // Update week total
  const weekStart = window._currentBoothWeek;
  const weekDates = getWeekDatesInt(weekStart);
  let weekTotal = 0;
  weekDates.forEach(({key}) => {
    if (!window._currentBoothOrder.offDays?.[key]) weekTotal += data[flavour][key] || 0;
  });
  const tid = `ft_${type}_${flavour.replace(/\s/g,'_')}`;
  const tel = document.getElementById(tid);
  if (tel) tel.textContent = weekTotal + (type==='daifuku'?' pcs':' pack');
}

async function saveCurrentBoothOrder() {
  const order = window._currentBoothOrder;
  const weekStart = window._currentBoothWeek;
  const boothId = window._currentBoothId;
  if (!order || !weekStart || !boothId) return showToast('Error: data tidak lengkap', 'error');
  await saveBoothOrder(boothId, weekStart, order);
  showToast('Order disimpan! 🎉', 'success');
}

// Booth management for Setup
async function renderBoothSetup() {
  await loadBooths();
  return `<div class="card">
    <div class="section-header"><h3>🏪 Booth Management</h3><button class="btn btn-sm btn-pink" onclick="openAddBoothModal()">+ Tambah</button></div>
    ${booths.map((b,i) => `
      <div class="list-item">
        <div class="list-item-info"><div class="list-item-name">${b.name}</div></div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-xs btn-outline" onclick="openEditBoothModal(${i})">Edit</button>
          <button class="btn btn-xs btn-red" onclick="removeBooth(${i})">Buang</button>
        </div>
      </div>`).join('')}
  </div>`;
}

function openAddBoothModal() {
  showModal('Tambah Booth', `
    <div class="form-group"><label class="form-label">Nama Booth</label><input class="form-input" id="nb_name" placeholder="e.g. Booth Shah Alam"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-pink" onclick="saveNewBooth()">Simpan</button>
    </div>`);
}

async function saveNewBooth() {
  const name = document.getElementById('nb_name').value.trim();
  if (!name) return showToast('Nama wajib', 'error');
  booths.push({ id: 'booth_' + Date.now(), name });
  await saveBooths();
  showToast('Booth ditambah!', 'success');
  closeModal();
  renderSetup();
}

function openEditBoothModal(idx) {
  const booth = booths[idx];
  showModal('Edit Booth', `
    <div class="form-group"><label class="form-label">Nama Booth</label><input class="form-input" id="eb_name" value="${booth.name}"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-pink" onclick="saveEditBooth(${idx})">Simpan</button>
    </div>`);
}

async function saveEditBooth(idx) {
  const name = document.getElementById('eb_name').value.trim();
  if (!name) return showToast('Nama wajib', 'error');
  booths[idx].name = name;
  await saveBooths();
  showToast('Booth dikemaskini!', 'success');
  closeModal();
  renderSetup();
}

async function removeBooth(idx) {
  if (!confirm(`Buang "${booths[idx].name}"?`)) return;
  booths.splice(idx, 1);
  await saveBooths();
  showToast('Booth dibuang!', 'success');
  renderSetup();
}


function toggleRestock(btn){const e=document.getElementById('restockExtra');if(!e)return;const h=e.style.display==='none';e.style.display=h?'block':'none';btn.textContent=h?'Sembunyikan ▲':'Lihat semua ▼';}
</script>
