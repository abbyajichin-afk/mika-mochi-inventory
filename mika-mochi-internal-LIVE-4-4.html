<!DOCTYPE html>
<html lang="ms">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mika Mochi — Internal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--pink:#DE8C96;--pink-dark:#B85D6B;--pink-pale:#FBEAEC;--cream:#FDFBFA;--text:#2B2B2B;--muted:#9C8B87;--border:#F1E4E0;--green:#27AE60;--red:#E74C3C;--orange:#E67E22;--blue:#2980B9;--purple:#8E44AD;--white:#fff;--shadow:0 2px 12px rgba(222,140,150,0.12);--r:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#FDF0F4,#fff)}
.login-logo{font-size:2.4rem;font-weight:800;color:var(--pink);letter-spacing:-1px;margin-bottom:2px}
.login-sub{color:var(--muted);font-size:0.82rem;margin-bottom:28px}
.login-card{background:white;border-radius:var(--r);padding:28px 24px;width:100%;max-width:360px;box-shadow:var(--shadow);border:1px solid var(--border)}
.login-card h2{font-size:1rem;font-weight:700;margin-bottom:18px}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.user-btn{background:var(--pink-pale);border:2px solid var(--border);border-radius:var(--rs);padding:11px 14px;text-align:left;cursor:pointer;transition:all 0.2s}
.user-btn.selected{border-color:var(--pink);background:white}
.user-btn .uname{font-weight:700;font-size:0.92rem}
.user-btn .urole{font-size:0.72rem;color:var(--muted)}
.pin-input{width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--rs);font-size:1.2rem;letter-spacing:8px;text-align:center;margin-bottom:12px;outline:none}
.pin-input:focus{border-color:var(--pink)}
.btn-primary{width:100%;background:var(--pink);color:white;border:none;border-radius:var(--rs);padding:13px;font-size:1rem;font-weight:700;cursor:pointer}
.login-error{color:var(--red);font-size:0.8rem;text-align:center;margin-top:6px}
#appShell{display:none;flex-direction:column;min-height:100vh}
.top-bar{background:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.top-bar-logo{font-size:1rem;font-weight:800;color:var(--pink)}
.top-bar-right{display:flex;align-items:center;gap:6px}
.top-bar-role{font-size:0.66rem;background:var(--pink-pale);color:var(--pink);padding:2px 7px;border-radius:20px;font-weight:700}
.top-bar-user{font-size:0.76rem;color:var(--muted)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:0.7rem;color:var(--muted);cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100;overflow-x:auto}
.nav-item{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;cursor:pointer;color:var(--muted);font-size:0.57rem;gap:2px;border:none;background:none;white-space:nowrap}
.nav-item.active{color:var(--pink)}
.nav-item svg{width:19px;height:19px}
.main-content{flex:1;padding:14px;padding-bottom:88px;max-width:600px;margin:0 auto;width:100%}
.page-header{margin-bottom:14px}
.page-header h1{font-size:1.3rem;font-weight:800}
.page-header p{font-size:0.76rem;color:var(--muted);margin-top:2px}
.card{background:white;border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:11px;box-shadow:var(--shadow)}
.card-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:9px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.stat-card{background:white;border-radius:var(--r);border:1px solid var(--border);padding:12px;box-shadow:var(--shadow)}
.stat-val{font-size:1.5rem;font-weight:800;color:var(--pink)}
.stat-label{font-size:0.68rem;color:var(--muted);margin-top:1px}
.alert{background:#FDECEA;border:1px solid #F5C6CB;border-radius:var(--rs);padding:10px 12px;margin-bottom:11px;display:flex;gap:7px;align-items:flex-start}
.alert.warn{background:#FFF3CD;border-color:#FECB3E}
.alert.info{background:#EBF5FB;border-color:#AED6F1}
.alert-text{font-size:0.78rem}
.alert-text strong{display:block;font-weight:700;margin-bottom:1px}
.tabs{display:flex;gap:5px;margin-bottom:11px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:20px;font-size:0.76rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--muted);white-space:nowrap}
.tab.active{background:var(--pink);color:white;border-color:var(--pink)}
.list-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;gap:9px}
.list-item:last-child{border-bottom:none}
.list-item-info{flex:1;min-width:0}
.list-item-name{font-weight:600;font-size:0.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item-meta{font-size:0.69rem;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.list-item-right{text-align:right;flex-shrink:0}
.stock-val{font-size:0.98rem;font-weight:800}
.stock-val.low{color:var(--red)}
.stock-val.ok{color:var(--green)}
.stock-val.zero{color:var(--muted)}
.stock-unit{font-size:0.67rem;color:var(--muted)}
.price-ind{font-size:0.66rem;font-weight:700;padding:1px 5px;border-radius:10px}
.price-up{background:#FDECEA;color:var(--red)}
.price-down{background:#EAF7EE;color:var(--green)}
.price-same{background:#FFF9E6;color:var(--orange)}
.btn{padding:9px 15px;border-radius:var(--rs);font-size:0.83rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-sm{padding:5px 10px;font-size:0.73rem}
.btn-xs{padding:3px 8px;font-size:0.69rem}
.btn-pink{background:var(--pink);color:white}
.btn-outline{background:white;border:1.5px solid var(--border);color:var(--text)}
.btn-green{background:var(--green);color:white}
.btn-red{background:var(--red);color:white}
.btn-orange{background:var(--orange);color:white}
.btn-blue{background:var(--blue);color:white}
.btn-row{display:flex;gap:7px;margin-top:11px}
.btn-row .btn{flex:1}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:var(--r) var(--r) 0 0;padding:18px 16px 34px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:1.25rem;cursor:pointer;color:var(--muted)}
.form-group{margin-bottom:11px}
.form-label{font-size:0.7rem;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.3px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:0.86rem;outline:none;transition:border 0.2s;background:white;color:var(--text)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--pink)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-textarea{resize:vertical;min-height:60px}
.log-item{background:var(--pink-pale);border-radius:var(--rs);padding:10px 12px;margin-bottom:7px;border:1px solid var(--border)}
.log-top{display:flex;justify-content:space-between;align-items:flex-start}
.log-title{font-weight:700;font-size:0.86rem}
.log-date{font-size:0.68rem;color:var(--muted)}
.log-detail{font-size:0.74rem;color:var(--muted);margin-top:2px}
.pl-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.83rem}
.pl-row:last-child{border-bottom:none}
.pl-row.total{font-weight:800;font-size:0.92rem;color:var(--pink)}
.pl-row.profit{font-weight:800;font-size:1rem;color:var(--green)}
.pl-row.loss{font-weight:800;font-size:1rem;color:var(--red)}
.pl-section-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
.pl-highlight{border-radius:var(--r);padding:15px;text-align:center;margin-top:11px}
.pl-highlight .big{font-size:1.9rem;font-weight:800}
.pl-highlight .lbl{font-size:0.74rem;opacity:0.85;margin-top:2px}
.recipe-card{background:white;border-radius:var(--r);border:1px solid var(--border);padding:13px;margin-bottom:9px;box-shadow:var(--shadow)}
.recipe-lock{font-size:0.68rem;background:#FFF3CD;color:var(--orange);padding:2px 7px;border-radius:20px;font-weight:700}
.recipe-prod{font-size:0.68rem;background:var(--pink-pale);color:var(--pink);padding:2px 7px;border-radius:20px;font-weight:700}
.ingredient-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.8rem}
.ingredient-row:last-child{border-bottom:none}
.order-card{background:white;border-radius:var(--r);border:1px solid var(--border);padding:13px;margin-bottom:9px;box-shadow:var(--shadow)}
.order-status{font-size:0.68rem;padding:2px 7px;border-radius:20px;font-weight:700}
.status-pending{background:#FFF3CD;color:var(--orange)}
.status-confirmed{background:#EAF7EE;color:var(--green)}
.status-in_progress{background:#EBF5FB;color:var(--blue)}
.status-completed{background:#EAF7EE;color:var(--green)}
.status-cancelled{background:#FDECEA;color:var(--red)}
.line-items-box{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:5px}
.line-row{display:grid;grid-template-columns:1fr 65px auto;gap:4px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--border)}
.item-picker{position:relative}
.item-picker-search{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit;box-sizing:border-box}
.item-picker-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;max-height:240px;overflow-y:auto;z-index:80;box-shadow:var(--shadow)}
.item-picker-cat{padding:6px 10px;font-size:0.66rem;font-weight:800;color:var(--pink);background:var(--pink-pale);position:sticky;top:0}
.item-picker-option{padding:9px 12px;font-size:0.8rem;cursor:pointer;border-bottom:1px solid var(--border)}
.item-picker-option:active{background:var(--pink-pale)}
.line-row:last-child{border-bottom:none}
.line-row select,.line-row input{padding:5px 6px;border:1px solid var(--border);border-radius:5px;font-size:0.76rem;width:100%}
.remove-line{background:none;border:none;color:var(--red);cursor:pointer;font-size:0.88rem;padding:2px 4px}
.add-line-btn{background:none;border:1.5px dashed var(--border);border-radius:var(--rs);padding:6px;width:100%;text-align:center;cursor:pointer;color:var(--muted);font-size:0.76rem}
.search-bar{display:flex;align-items:center;background:white;border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 10px;margin-bottom:9px;gap:6px}
.search-bar input{border:none;outline:none;flex:1;font-size:0.83rem;background:none;color:var(--text)}
.empty-state{text-align:center;padding:28px 18px;color:var(--muted)}
.empty-state .icon{font-size:2rem;margin-bottom:7px}
.empty-state p{font-size:0.8rem}
.fab{position:fixed;bottom:74px;right:16px;width:46px;height:46px;background:var(--pink);border-radius:50%;border:none;color:white;font-size:1.35rem;cursor:pointer;box-shadow:0 4px 16px rgba(232,99,140,0.4);display:flex;align-items:center;justify-content:center;z-index:90}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:#2D1B22;color:white;padding:8px 16px;border-radius:20px;font-size:0.78rem;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:0.64rem;font-weight:700}
.badge-owner{background:#F9EBFF;color:var(--purple)}
.badge-manager{background:#EBF5FB;color:var(--blue)}
.badge-supervisor{background:var(--pink-pale);color:var(--pink)}
.badge-staff{background:#EAF7EE;color:var(--green)}
.loading{text-align:center;padding:20px;color:var(--muted);font-size:0.8rem}
.order-flavour-card-int{background:white;border-radius:var(--r);border:1px solid var(--border);margin-bottom:0;overflow:hidden;box-shadow:var(--shadow)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.section-header h3{font-size:0.9rem;font-weight:700}
.cost-highlight{border-radius:var(--r);padding:15px;text-align:center;margin-top:11px}
.cost-highlight .big{font-size:1.9rem;font-weight:800}
.cost-highlight .lbl{font-size:0.74rem;opacity:0.85;margin-top:2px}
</style>
</head>

async function renderDashboard(){const c=document.getElementById('mainContent');c.innerHTML='<div class="loading">Loading...</div>';const[{data:items},{data:batches},{data:requests},{data:orders}]=await Promise.all([sb.from('mm_inventory_items').select('*').eq('active',true),sb.from('mm_mochi_batches').select('*').order('batch_date',{ascending:false}).limit(5),sb.from('mm_requests').select('*').eq('status','pending'),sb.from('mm_internal_orders').select('*').eq('status','pending').limit(3)]);allItems=items||[];const lowStock=allItems.filter(i=>i.reorder_level>0&&i.current_stock<=i.reorder_level);const totalInvVal=allItems.reduce((s,i)=>s+((i.current_stock||0)*(i.cost_per_unit||0)),0);const now=new Date();const m=now.getMonth()+1;const y=now.getFullYear();const mb=(batches||[]).filter(b=>{const d=new Date(b.batch_date);return d.getMonth()+1===m&&d.getFullYear()===y;});const totalUnits=mb.reduce((s,b)=>s+(b.units_produced||0),0);let html=`<div class="page-header"><h1>Dashboard</h1><p>${now.toLocaleDateString('ms-MY',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>`;if(lowStock.length>0)html+=`<div class="alert"><div>⚠️</div><div class="alert-text"><strong>${lowStock.length} item stok rendah!</strong>${lowStock.slice(0,3).map(i=>i.name).join(', ')}${lowStock.length>3?` +${lowStock.length-3} lagi`:''}</div></div>`;if((requests||[]).length>0&&isOwner())html+=`<div class="alert warn"><div>📋</div><div class="alert-text"><strong>${requests.length} permohonan menunggu kelulusan</strong></div></div>`;if((orders||[]).length>0&&isProduction())html+=`<div class="alert warn"><div>📦</div><div class="alert-text"><strong>${orders.length} internal order pending</strong></div></div>`;html+=`<div class="stat-grid"><div class="stat-card"><div class="stat-val">${allItems.length}</div><div class="stat-label">Jumlah Item</div></div><div class="stat-card"><div class="stat-val" style="color:var(--red)">${lowStock.length}</div><div class="stat-label">Perlu Restock</div></div><div class="stat-card"><div class="stat-val" style="color:var(--blue)">${mb.length}</div><div class="stat-label">Batch Bulan Ini</div></div><div class="stat-card"><div class="stat-val">${totalUnits}</div><div class="stat-label">Unit Dihasilkan</div></div></div>`;if(isOwner())html+=`<div class="card" style="background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;cursor:pointer" onclick="navigate('inventory')"><div style="font-size:0.7rem;opacity:0.85;text-transform:uppercase;margin-bottom:3px">💰 Nilai Inventori</div><div style="font-size:1.85rem;font-weight:800">RM ${totalInvVal.toLocaleString('ms-MY',{minimumFractionDigits:2})}</div><div style="font-size:0.7rem;opacity:0.8;margin-top:2px">Tap untuk breakdown →</div></div>`;if(lowStock.length>0){html+=`<div class="card"><div class="card-title">⚠️ Perlu Restock (${lowStock.length})</div>`;html+=lowStock.slice(0,5).map(i=>`<div class="list-item" style="cursor:default"><div class="list-item-info"><div class="list-item-name">${i.name}</div><div class="list-item-meta">${CAT_LABELS[i.category]||i.category}</div></div><div class="list-item-right"><div class="stock-val low">${parseFloat(i.current_stock).toFixed(1)}</div><div class="stock-unit">${i.unit}</div></div></div>`).join('');if(lowStock.length>5)html+=`<div id="restockExtra" style="display:none">${lowStock.slice(5).map(i=>`<div class="list-item" style="cursor:default"><div class="list-item-info"><div class="list-item-name">${i.name}</div><div class="list-item-meta">${CAT_LABELS[i.category]||i.category}</div></div><div class="list-item-right"><div class="stock-val low">${parseFloat(i.current_stock).toFixed(1)}</div><div class="stock-unit">${i.unit}</div></div></div>`).join('')}</div><button onclick="toggleRestock(this)" style="width:100%;background:none;border:1.5px dashed var(--border);border-radius:8px;padding:7px;color:var(--muted);font-size:0.76rem;margin-top:7px;cursor:pointer">Lihat semua ${lowStock.length} item ▼</button>`;html+=`</div>`;}if(batches?.length){html+=`<div class="card"><div class="card-title">Batch Terkini</div>${(batches||[]).slice(0,3).map(b=>`<div class="log-item"><div class="log-top"><div class="log-title">🍡 ${b.units_produced} unit</div><div class="log-date">${new Date(b.batch_date).toLocaleDateString('ms-MY')}</div></div><div class="log-detail">Kos: RM ${((b.filling_cost||0)+(b.raw_mat_cost||0)).toFixed(2)}${b.notes?' • '+b.notes:''}</div></div>`).join('')}</div>`;}c.innerHTML=html;}

async function renderInventory(){const c=document.getElementById('mainContent');c.innerHTML='<div class="loading">Loading...</div>';const{data}=await sb.from('mm_inventory_items').select('*').eq('active',true).order('name');allItems=data||[];invSearch='';renderInvPage();showFab(()=>openAddItemModal());}
function renderInvPage(){const c=document.getElementById('mainContent');if(invTab==='__nilai__'){const tv=allItems.reduce((s,i)=>s+((i.current_stock||0)*(i.cost_per_unit||0)),0);const bc={};allItems.forEach(i=>{const v=(i.current_stock||0)*(i.cost_per_unit||0);bc[i.category]=(bc[i.category]||0)+v;});const sc=Object.entries(bc).sort((a,b)=>b[1]-a[1]);const top=[...allItems].filter(i=>i.current_stock>0).map(i=>({...i,nilai:(i.current_stock||0)*(i.cost_per_unit||0)})).sort((a,b)=>b.nilai-a.nilai).slice(0,10);let h=`<div class="page-header"><h1>💰 Nilai Inventori</h1></div><div class="tabs"><button class="tab" onclick="switchInvTab('raw_material')">← Balik</button><button class="tab active">💰 Nilai</button></div><div class="cost-highlight" style="background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;margin-bottom:11px"><div class="big">RM ${tv.toLocaleString('ms-MY',{minimumFractionDigits:2})}</div><div class="lbl">Nilai semua stok</div></div><div class="card"><div class="card-title">By Kategori</div>`;sc.forEach(([cat,val])=>{const p=tv>0?(val/tv*100).toFixed(1):0;h+=`<div class="pl-row"><span>${CAT_LABELS[cat]||cat}</span><span><strong>RM ${val.toLocaleString('ms-MY',{minimumFractionDigits:2})}</strong> <small style="color:var(--muted)">${p}%</small></span></div>`;});h+=`</div><div class="card"><div class="card-title">🔥 Top 10 Costly</div>`;top.forEach((i,x)=>{h+=`<div class="list-item" style="cursor:default"><div class="list-item-info"><div class="list-item-name">${x+1}. ${i.name}</div><div class="list-item-meta">${CAT_LABELS[i.category]||i.category} • ${parseFloat(i.current_stock).toFixed(1)} ${i.unit}</div></div><div style="font-weight:800;color:var(--pink);font-size:0.88rem">RM ${i.nilai.toLocaleString('ms-MY',{minimumFractionDigits:2})}</div></div>`;});h+=`</div>`;c.innerHTML=h;return;}
let filtered=allItems.filter(i=>i.category===invTab);if(invSearch)filtered=filtered.filter(i=>i.name.toLowerCase().includes(invSearch.toLowerCase()));const tabs=CAT_TABS.map(cat=>`<button class="tab ${invTab===cat?'active':''}" onclick="switchInvTab('${cat}')">${CAT_LABELS[cat]}</button>`).join('');let html=`<div class="page-header"><h1>Inventori</h1><p>${allItems.length} item • ${allItems.filter(i=>i.reorder_level>0&&i.current_stock<=i.reorder_level).length} perlu restock</p></div><div class="tabs">${tabs}${isOwner()?'<button class="tab" onclick="switchInvTab(\'__nilai__\')">💰 Nilai</button>':''}</div><div class="search-bar"><span>🔍</span><input placeholder="Cari item..." oninput="invSearch=this.value;renderInvPage()" value="${invSearch}"></div><div style="display:flex;gap:6px;margin-bottom:11px"><button class="btn btn-pink btn-sm" style="flex:1" onclick="openStockInModal()">+ Masuk Stok</button><button class="btn btn-outline btn-sm" style="flex:1" onclick="openStockOutModal()">− Keluar Stok</button></div><div class="card">`;
if(!filtered.length)html+=`<div class="empty-state"><div class="icon">📦</div><p>${invSearch?'Tiada item dijumpai':'Belum ada item'}</p></div>`;
else html+=filtered.map(i=>{const isLow=i.reorder_level>0&&i.current_stock<=i.reorder_level;const cls=i.current_stock<=0?'zero':isLow?'low':'ok';let pi='';if(i.previous_cost>0){if(i.cost_per_unit>i.previous_cost){const p=((i.cost_per_unit-i.previous_cost)/i.previous_cost*100).toFixed(1);pi=`<span class="price-ind price-up">🔴 +${p}%</span>`;}else if(i.cost_per_unit<i.previous_cost){const p=((i.cost_per_unit-i.previous_cost)/i.previous_cost*100).toFixed(1);pi=`<span class="price-ind price-down">🟢 ${p}%</span>`;}else pi=`<span class="price-ind price-same">🟡 0%</span>`;}return`<div class="list-item" onclick="openItemDetail('${i.id}')"><div class="list-item-info"><div class="list-item-name">${i.name}</div><div class="list-item-meta">RM ${parseFloat(i.cost_per_unit||0).toFixed(2)}/${i.unit} ${pi}</div></div><div class="list-item-right"><div class="stock-val ${cls}">${parseFloat(i.current_stock||0).toFixed(1)}</div><div class="stock-unit">${i.unit}</div></div></div>`;}).join('');
html+=`</div>`;c.innerHTML=html;}
function switchInvTab(t){invTab=t;invSearch='';renderInvPage();}
async function openItemDetail(id){const item=allItems.find(i=>i.id===id);if(!item)return;const isLow=item.reorder_level>0&&item.current_stock<=item.reorder_level;let ph='';if(isOwner()){const{data:hist}=await sb.from('mm_price_history').select('*').eq('item_id',id).order('recorded_at',{ascending:false}).limit(10);if(hist?.length){ph=`<div style="margin-top:12px"><div class="card-title">📈 History Harga</div>${hist.map(p=>{const dir=p.direction==='naik'?`<span style="color:var(--red);font-weight:700;font-size:0.7rem">🔴 +${parseFloat(p.change_pct||0).toFixed(1)}%</span>`:p.direction==='turun'?`<span style="color:var(--green);font-weight:700;font-size:0.7rem">🟢 ${parseFloat(p.change_pct||0).toFixed(1)}%</span>`:`<span style="color:var(--orange);font-weight:700;font-size:0.7rem">🟡 0%</span>`;return`<div class="pl-row"><div><div style="font-weight:700;font-size:0.84rem">RM ${parseFloat(p.new_price||0).toFixed(2)}</div><div style="font-size:0.68rem;color:var(--muted)">${new Date(p.recorded_at).toLocaleDateString('ms-MY')}</div></div>${dir}</div>`;}).join('')}</div>`;}else ph=`<div style="margin-top:12px"><div class="card-title">📈 History Harga</div><p style="font-size:0.78rem;color:var(--muted)">Belum ada history.</p></div>`;}
showModal(item.name,`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px"><div><div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase">${CAT_LABELS[item.category]||item.category}</div><div style="font-size:1.85rem;font-weight:800;color:${isLow?'var(--red)':'var(--green)'}">${parseFloat(item.current_stock||0).toFixed(2)} <span style="font-size:0.9rem;font-weight:500">${item.unit}</span></div><div style="font-size:0.76rem;color:var(--muted)">Reorder: ${item.reorder_level} ${item.unit}</div></div><div style="text-align:right"><div style="font-size:1.2rem;font-weight:800;color:var(--pink)">RM ${parseFloat(item.cost_per_unit||0).toFixed(2)}</div><div style="font-size:0.68rem;color:var(--muted)">per ${item.unit}</div></div></div>${ph}<div class="btn-row" style="margin-top:12px"><button class="btn btn-outline" onclick="openEditItemModal('${item.id}')">Edit</button><button class="btn btn-pink" onclick="openStockInModal('${item.id}')">+ Masuk Stok</button></div>`);}
function openAddItemModal(){showModal('Tambah Item',`<div class="form-group"><label class="form-label">Nama</label><input class="form-input" id="m_name" placeholder="e.g. Tepung Beras"></div><div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="m_cat">${CAT_TABS.map(c=>`<option value="${c}">${CAT_LABELS[c]}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Unit</label><input class="form-input" id="m_unit" placeholder="kg/pcs/btl"></div><div class="form-group"><label class="form-label">Kos/Unit (RM)</label><input class="form-input" id="m_cost" type="number" placeholder="0.00" step="0.01"></div></div><div class="form-group"><label class="form-label">Reorder Level</label><input class="form-input" id="m_reorder" type="number" placeholder="0" step="0.01"></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-pink" onclick="saveNewItem()">Simpan</button></div>`);}
async function saveNewItem(){const name=document.getElementById('m_name').value.trim();const cat=document.getElementById('m_cat').value;const unit=document.getElementById('m_unit').value.trim();const cost=parseFloat(document.getElementById('m_cost').value)||0;const reorder=parseFloat(document.getElementById('m_reorder').value)||0;if(!name||!unit)return showToast('Nama & unit wajib','error');await sb.from('mm_inventory_items').insert({name,category:cat,unit,cost_per_unit:cost,previous_cost:0,reorder_level:reorder});showToast('Item ditambah!','success');closeModal();renderInventory();}
function openEditItemModal(id){const item=allItems.find(i=>i.id===id);if(!item)return;closeModal();showModal('Edit Item',`<div class="form-group"><label class="form-label">Nama</label><input class="form-input" id="ei_name" value="${item.name}"></div><div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="ei_cat">${CAT_TABS.map(c=>`<option value="${c}" ${c===item.category?'selected':''}>${CAT_LABELS[c]}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Unit</label><input class="form-input" id="ei_unit" value="${item.unit}"></div><div class="form-group"><label class="form-label">Reorder Level</label><input class="form-input" id="ei_reorder" type="number" value="${item.reorder_level||0}" step="0.01"></div></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-pink" onclick="saveEditItem('${id}')">Simpan</button></div>`);}
async function saveEditItem(id){const name=document.getElementById('ei_name').value.trim();const cat=document.getElementById('ei_cat').value;const unit=document.getElementById('ei_unit').value.trim();const reorder=parseFloat(document.getElementById('ei_reorder').value)||0;if(!name||!unit)return showToast('Nama & unit wajib','error');await sb.from('mm_inventory_items').update({name,category:cat,unit,reorder_level:reorder}).eq('id',id);showToast('Item dikemaskini!','success');closeModal();renderInventory();}
async function openStockInModal(preId=null){showModal('Masuk Stok',`<div class="form-group"><label class="form-label">Item</label><select class="form-select" id="si_item" onchange="updateSIP()">${allItems.map(i=>`<option value="${i.id}" data-cost="${i.cost_per_unit||0}" ${i.id===preId?'selected':''}>${i.name} (${i.unit})</option>`).join('')}</select></div><div id="si_cmp" style="margin-bottom:7px"></div><div class="form-row"><div class="form-group"><label class="form-label">Kuantiti</label><input class="form-input" id="si_qty" type="number" placeholder="0" step="0.01"></div><div class="form-group"><label class="form-label">Harga/Unit (RM)</label><input class="form-input" id="si_cost" type="number" placeholder="0.00" step="0.01" oninput="updateSIC()"></div></div><div class="form-group"><label class="form-label">Tarikh</label><input class="form-input" id="si_date" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="form-group"><label class="form-label">Nota</label><input class="form-input" id="si_notes" placeholder="Supplier..."></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-green" onclick="saveStockIn()">Masuk Stok</button></div>`);updateSIP();}
function updateSIP(){const s=document.getElementById('si_item');const o=s?.options[s.selectedIndex];document.getElementById('si_cost').value=o?.dataset?.cost||'';updateSIC();}
function updateSIC(){const s=document.getElementById('si_item');const nc=parseFloat(document.getElementById('si_cost').value)||0;const o=s?.options[s.selectedIndex];const oc=parseFloat(o?.dataset?.cost||0);const d=document.getElementById('si_cmp');if(!d||!oc||!nc)return;if(nc===oc){d.innerHTML=`<div style="font-size:0.76rem;color:var(--orange);font-weight:600">🟡 Sama: RM ${oc.toFixed(2)}</div>`;return;}const p=((nc-oc)/oc*100).toFixed(1);d.innerHTML=nc>oc?`<div style="font-size:0.76rem;color:var(--red);font-weight:600">🔴 Naik ${p}% (RM ${oc.toFixed(2)} → RM ${nc.toFixed(2)})</div>`:`<div style="font-size:0.76rem;color:var(--green);font-weight:600">🟢 Turun ${p}% (RM ${oc.toFixed(2)} → RM ${nc.toFixed(2)})</div>`;}
async function saveStockIn(){const itemId=document.getElementById('si_item').value;const qty=parseFloat(document.getElementById('si_qty').value);const cost=parseFloat(document.getElementById('si_cost').value)||0;const date=document.getElementById('si_date').value;const notes=document.getElementById('si_notes').value;if(!qty||qty<=0)return showToast('Kuantiti wajib','error');const item=allItems.find(i=>i.id===itemId);const oldCost=item.cost_per_unit||0;const newStock=(item.current_stock||0)+qty;let dir='maintain',pct=0;if(oldCost>0){if(cost>oldCost){dir='naik';pct=((cost-oldCost)/oldCost*100);}else if(cost<oldCost){dir='turun';pct=((cost-oldCost)/oldCost*100);}}if(oldCost!==cost)await sb.from('mm_price_history').insert({item_id:itemId,old_price:oldCost,new_price:cost,change_pct:pct,direction:dir,recorded_by:currentUser.id});await sb.from('mm_stock_movements').insert({item_id:itemId,movement_type:'in',quantity:qty,unit_cost:cost,total_cost:qty*cost,reason:'purchase',noted_by:currentUser.id,movement_date:date,notes});await sb.from('mm_inventory_items').update({current_stock:newStock,previous_cost:oldCost,cost_per_unit:cost}).eq('id',itemId);showToast('Stok masuk!','success');closeModal();renderInventory();}
async function openStockOutModal(){showModal('Keluar Stok',`<div class="form-group"><label class="form-label">Item</label><select class="form-select" id="so_item">${allItems.map(i=>`<option value="${i.id}">${i.name} (${parseFloat(i.current_stock||0).toFixed(1)} ${i.unit})</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Kuantiti</label><input class="form-input" id="so_qty" type="number" placeholder="0" step="0.01"></div><div class="form-group"><label class="form-label">Sebab</label><select class="form-select" id="so_reason"><option value="wastage">Pembaziran</option><option value="adjustment">Adjustment</option><option value="lain_lain">Lain-lain</option></select></div></div><div class="form-group"><label class="form-label">Nota</label><input class="form-input" id="so_notes" placeholder="Keterangan..."></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-red" onclick="saveStockOut()">Keluar</button></div>`);}
async function saveStockOut(){const id=document.getElementById('so_item').value;const qty=parseFloat(document.getElementById('so_qty').value);const reason=document.getElementById('so_reason').value;const notes=document.getElementById('so_notes').value;if(!qty||qty<=0)return showToast('Kuantiti wajib','error');const item=allItems.find(i=>i.id===id);if(qty>item.current_stock)return showToast('Stok tidak mencukupi!','error');await sb.from('mm_stock_movements').insert({item_id:id,movement_type:'out',quantity:qty,reason,noted_by:currentUser.id,movement_date:new Date().toISOString().split('T')[0],notes});await sb.from('mm_inventory_items').update({current_stock:item.current_stock-qty}).eq('id',id);showToast('Stok dikurangkan!','success');closeModal();renderInventory();}
// PRODUCTION
async function renderProduction(){const c=document.getElementById('mainContent');c.innerHTML='<div class="loading">Loading...</div>';const[{data:items},{data:batches},{data:fl},{data:orders}]=await Promise.all([sb.from('mm_inventory_items').select('*').eq('active',true),sb.from('mm_mochi_batches').select('*').order('batch_date',{ascending:false}).limit(20),sb.from('mm_filling_production').select('*, mm_inventory_items(name)').order('batch_date',{ascending:false}).limit(20),sb.from('mm_internal_orders').select('*, mm_users(name)').order('created_at',{ascending:false}).limit(20)]);allItems=items||[];renderProdPage(batches||[],fl||[],orders||[]);}
function renderProdPage(batches,fl,orders){const c=document.getElementById('mainContent');const pend=orders.filter(o=>o.status==='pending').length;let h=`<div class="page-header"><h1>Produksi</h1></div><div class="tabs"><button class="tab ${prodTab==='batch'?'active':''}" onclick="switchProdTab('batch')">Batch Mochi</button><button class="tab ${prodTab==='filling'?'active':''}" onclick="switchProdTab('filling')">Filling</button><button class="tab ${prodTab==='orders'?'active':''}" onclick="switchProdTab('orders')">Orders${pend>0?' 🔴':''}</button></div>`;
if(prodTab==='batch'){h+=`<button class="btn btn-pink" style="width:100%;margin-bottom:11px" onclick="openMochiBatchModal()">+ Log Batch Mochi</button>`;if(!batches.length)h+=`<div class="empty-state"><div class="icon">🍡</div><p>Belum ada batch</p></div>`;else h+=batches.map(b=>`<div class="log-item"><div class="log-top"><div class="log-title">🍡 ${b.units_produced} unit</div><div class="log-date">${new Date(b.batch_date).toLocaleDateString('ms-MY')}</div></div><div class="log-detail">Filling: RM${parseFloat(b.filling_cost||0).toFixed(2)} • Raw mat: RM${parseFloat(b.raw_mat_cost||0).toFixed(2)}${b.notes?' • '+b.notes:''}</div></div>`).join('');}
else if(prodTab==='filling'){h+=`<button class="btn btn-pink" style="width:100%;margin-bottom:11px" onclick="openFillingProdModal()">+ Log Produksi Filling</button>`;if(!fl.length)h+=`<div class="empty-state"><div class="icon">🍓</div><p>Belum ada log filling</p></div>`;else h+=fl.map(f=>`<div class="log-item"><div class="log-top"><div class="log-title">${f.mm_inventory_items?.name||'—'}</div><div class="log-date">${new Date(f.batch_date).toLocaleDateString('ms-MY')}</div></div><div class="log-detail">Dihasilkan: ${f.qty_produced} • Kos RM ${parseFloat(f.raw_mat_cost||0).toFixed(2)}${f.notes?' • '+f.notes:''}</div></div>`).join('');}
else{h+=`<button class="btn btn-pink" style="width:100%;margin-bottom:11px" onclick="openNewOrderModal()">+ Buat Internal Order</button>`;if(!orders.length)h+=`<div class="empty-state"><div class="icon">📦</div><p>Belum ada order</p></div>`;else h+=orders.map(o=>`<div class="order-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px"><div><div style="font-weight:700;font-size:0.88rem">${o.order_no||'—'}</div><div style="font-size:0.7rem;color:var(--muted)">${new Date(o.order_date).toLocaleDateString('ms-MY')} • ${o.mm_users?.name||'—'}</div></div><span class="order-status status-${o.status}">${o.status.toUpperCase()}</span></div>${o.notes?`<div style="font-size:0.76rem;color:var(--muted);margin-bottom:7px">${o.notes}</div>`:''}${o.status==='pending'&&isProduction()?`<button class="btn btn-green btn-sm" onclick="confirmOrder('${o.id}')">Confirm</button>`:o.status==='confirmed'&&isProduction()?`<button class="btn btn-orange btn-sm" onclick="completeOrder('${o.id}')">Complete</button>`:''}</div>`).join('');}
c.innerHTML=h;}
function switchProdTab(t){prodTab=t;renderProduction();}
function openFillingProdModal(){const fi=allItems.filter(i=>i.category==='filling_ready');const rm=allItems.filter(i=>COSTING_CATS.includes(i.category)&&i.category!=='filling_ready');showModal('Log Produksi Filling',`<div class="form-group"><label class="form-label">Filling Dihasilkan</label><select class="form-select" id="fp_filling">${fi.length?fi.map(f=>`<option value="${f.id}">${f.name}</option>`).join(''):'<option>— Tambah filling dalam Inventori dulu —</option>'}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Kuantiti</label><input class="form-input" id="fp_qty" type="number" placeholder="0" step="0.01"></div><div class="form-group"><label class="form-label">Tarikh</label><input class="form-input" id="fp_date" type="date" value="${new Date().toISOString().split('T')[0]}"></div></div><div class="form-group"><label class="form-label">Bahan Digunakan</label><div id="fp_lines" class="line-items-box"><div class="line-row"><select class="fp_rm">${rm.map(r=>`<option value="${r.id}" data-cost="${r.cost_per_unit||0}">${r.name}</option>`).join('')}</select><input type="number" class="fp_qi" placeholder="Qty" step="0.01"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button></div></div><button class="add-line-btn" onclick="addFpLine()">+ Tambah bahan</button></div><div class="form-group"><label class="form-label">Nota</label><input class="form-input" id="fp_notes" placeholder="Nota..."></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-pink" onclick="saveFillingProd()">Simpan</button></div>`);}
function addFpLine(){const rm=allItems.filter(i=>COSTING_CATS.includes(i.category)&&i.category!=='filling_ready');const c=document.getElementById('fp_lines');const d=document.createElement('div');d.className='line-row';d.innerHTML=`<select class="fp_rm">${rm.map(r=>`<option value="${r.id}" data-cost="${r.cost_per_unit||0}">${r.name}</option>`).join('')}</select><input type="number" class="fp_qi" placeholder="Qty" step="0.01"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button>`;c.appendChild(d);}
async function saveFillingProd(){const fid=document.getElementById('fp_filling').value;const qty=parseFloat(document.getElementById('fp_qty').value);const date=document.getElementById('fp_date').value;const notes=document.getElementById('fp_notes').value;if(!fid||!qty||qty<=0)return showToast('Filling & kuantiti wajib','error');let tc=0;const lines=[];document.querySelectorAll('#fp_lines .line-row').forEach(row=>{const id=row.querySelector('.fp_rm').value;const q=parseFloat(row.querySelector('.fp_qi').value)||0;if(!q)return;const item=allItems.find(i=>i.id===id);const cost=q*(item?.cost_per_unit||0);tc+=cost;lines.push({item_id:id,quantity_used:q,unit_cost:item?.cost_per_unit||0,total_cost:cost});});const{data:prod,error}=await sb.from('mm_filling_production').insert({filling_item_id:fid,batch_date:date,qty_produced:qty,raw_mat_cost:tc,notes,produced_by:currentUser.id}).select().single();if(error)return showToast('Gagal simpan','error');if(lines.length){await sb.from('mm_filling_production_items').insert(lines.map(l=>({...l,production_id:prod.id})));for(const l of lines){const item=allItems.find(i=>i.id===l.item_id);await sb.from('mm_inventory_items').update({current_stock:Math.max(0,(item?.current_stock||0)-l.quantity_used)}).eq('id',l.item_id);}}const filling=allItems.find(i=>i.id===fid);await sb.from('mm_inventory_items').update({current_stock:(filling?.current_stock||0)+qty}).eq('id',fid);showToast('Log filling disimpan!','success');closeModal();renderProduction();}
function openMochiBatchModal(){const fi=allItems.filter(i=>i.category==='filling_ready');const rm=allItems.filter(i=>COSTING_CATS.filter(c=>c!=='filling_ready').includes(i.category));showModal('Log Batch Mochi',`<div class="form-row"><div class="form-group"><label class="form-label">Unit Dihasilkan</label><input class="form-input" id="mb_units" type="number" placeholder="0"></div><div class="form-group"><label class="form-label">Tarikh</label><input class="form-input" id="mb_date" type="date" value="${new Date().toISOString().split('T')[0]}"></div></div><div class="form-group"><label class="form-label">Filling Digunakan</label><div id="mb_fl" class="line-items-box"><div class="line-row"><select class="mb_fli">${fi.length?fi.map(f=>`<option value="${f.id}" data-cost="${f.cost_per_unit||0}">${f.name}</option>`).join(''):'<option>— Tiada filling —</option>'}</select><input type="number" class="mb_flq" placeholder="Qty" step="0.01"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button></div></div><button class="add-line-btn" onclick="addMbFl()">+ Filling</button></div><div class="form-group"><label class="form-label">Raw Material (Kulit)</label><div id="mb_rm" class="line-items-box"><div class="line-row"><select class="mb_rmi">${rm.map(r=>`<option value="${r.id}" data-cost="${r.cost_per_unit||0}">${r.name}</option>`).join('')}</select><input type="number" class="mb_rmq" placeholder="Qty" step="0.01"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button></div></div><button class="add-line-btn" onclick="addMbRm()">+ Bahan</button></div><div class="form-group"><label class="form-label">Nota</label><input class="form-input" id="mb_notes" placeholder="Nota..."></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-pink" onclick="saveMochiBatch()">Simpan</button></div>`);}
function addMbFl(){const fi=allItems.filter(i=>i.category==='filling_ready');const c=document.getElementById('mb_fl');const d=document.createElement('div');d.className='line-row';d.innerHTML=`<select class="mb_fli">${fi.map(f=>`<option value="${f.id}" data-cost="${f.cost_per_unit||0}">${f.name}</option>`).join('')}</select><input type="number" class="mb_flq" placeholder="Qty" step="0.01"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button>`;c.appendChild(d);}
function addMbRm(){const rm=allItems.filter(i=>COSTING_CATS.filter(c=>c!=='filling_ready').includes(i.category));const c=document.getElementById('mb_rm');const d=document.createElement('div');d.className='line-row';d.innerHTML=`<select class="mb_rmi">${rm.map(r=>`<option value="${r.id}" data-cost="${r.cost_per_unit||0}">${r.name}</option>`).join('')}</select><input type="number" class="mb_rmq" placeholder="Qty" step="0.01"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button>`;c.appendChild(d);}
async function saveMochiBatch(){const units=parseFloat(document.getElementById('mb_units').value);const date=document.getElementById('mb_date').value;const notes=document.getElementById('mb_notes').value;if(!units||units<=0)return showToast('Unit wajib','error');let fc=0,rc=0;const fl=[],rl=[];document.querySelectorAll('#mb_fl .line-row').forEach(row=>{const id=row.querySelector('.mb_fli').value;const q=parseFloat(row.querySelector('.mb_flq').value)||0;if(!q)return;const item=allItems.find(i=>i.id===id);const cost=q*(item?.cost_per_unit||0);fc+=cost;fl.push({filling_item_id:id,quantity_used:q,cost_per_unit:item?.cost_per_unit||0,total_cost:cost});});document.querySelectorAll('#mb_rm .line-row').forEach(row=>{const id=row.querySelector('.mb_rmi').value;const q=parseFloat(row.querySelector('.mb_rmq').value)||0;if(!q)return;const item=allItems.find(i=>i.id===id);const cost=q*(item?.cost_per_unit||0);rc+=cost;rl.push({item_id:id,quantity_used:q,unit_cost:item?.cost_per_unit||0,total_cost:cost});});const{data:batch,error}=await sb.from('mm_mochi_batches').insert({batch_date:date,units_produced:units,filling_cost:fc,raw_mat_cost:rc,notes,produced_by:currentUser.id}).select().single();if(error)return showToast('Gagal simpan','error');if(fl.length){await sb.from('mm_mochi_batch_fillings').insert(fl.map(l=>({...l,batch_id:batch.id})));for(const l of fl){const item=allItems.find(i=>i.id===l.filling_item_id);await sb.from('mm_inventory_items').update({current_stock:Math.max(0,(item?.current_stock||0)-l.quantity_used)}).eq('id',l.filling_item_id);}}if(rl.length){await sb.from('mm_mochi_batch_items').insert(rl.map(l=>({...l,batch_id:batch.id})));for(const l of rl){const item=allItems.find(i=>i.id===l.item_id);await sb.from('mm_inventory_items').update({current_stock:Math.max(0,(item?.current_stock||0)-l.quantity_used)}).eq('id',l.item_id);}}showToast('Batch disimpan!','success');closeModal();renderProduction();}
function openNewOrderModal(){showModal('Buat Internal Order',`<div class="form-group"><label class="form-label">Nota / Keperluan</label><textarea class="form-textarea" id="io_notes" placeholder="e.g. 200 pcs mochi untuk booth..."></textarea></div><div class="form-group"><label class="form-label">Item yang diorder</label><div id="io_lines" class="line-items-box"><div class="line-row"><input type="text" class="io_product" placeholder="e.g. Daifuku Strawberry"><input type="number" class="io_qty" placeholder="Qty"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button></div></div><button class="add-line-btn" onclick="addOrderLine()">+ Tambah item</button></div><div class="btn-row"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-pink" onclick="saveInternalOrder()">Hantar Order</button></div>`);}
function addOrderLine(){const c=document.getElementById('io_lines');const d=document.createElement('div');d.className='line-row';d.innerHTML=`<input type="text" class="io_product" placeholder="Nama produk"><input type="number" class="io_qty" placeholder="Qty"><button class="remove-line" onclick="this.closest('.line-row').remove()">✕</button>`;c.appendChild(d);}
async function saveInternalOrder(){const notes=document.getElementById('io_notes').value;const lines=[];document.querySelectorAll('#io_lines .line-row').forEach(row=>{const p=row.querySelector('.io_product').value.trim();const q=parseFloat(row.querySelector('.io_qty').value)||0;if(p&&q)lines.push({product_name:p,quantity:q,unit:'pcs'});});if(!lines.length)return showToast('Tambah sekurang-kurangnya 1 item','error');const on='ORD-'+Date.now().toString().slice(-6);const{data:order,error}=await sb.from('mm_internal_orders').insert({order_no:on,requested_by:currentUser.id,notes,status:'pending'}).select().single();if(error)return showToast('Gagal simpan','error');await sb.from('mm_internal_order_items').insert(lines.map(l=>({...l,order_id:order.id})));showToast('Order dihantar!','success');closeModal();renderProduction();}
async function confirmOrder(id){await sb.from('mm_internal_orders').update({status:'confirmed',confirmed_by:currentUser.id,confirmed_at:new Date().toISOString()}).eq('id',id);showToast('Order confirmed!','success');renderProduction();}
async function completeOrder(id){await sb.from('mm_internal_orders').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',id);showToast('Order completed!','success');renderProduction();}

async function renderJadual(){const c=document.getElementById('mainContent');c.innerHTML='<div class="loading">Loading...</div>';const[{data:requests}]=await Promise.all([sb.from('mm_requests').select('*, mm_users(name)').order('created_at',{ascending:false}).limit(50)]);renderJadualPage(requests||[]);}
function renderJadualPage(requests){const c=document.getElementById('mainContent');const pend=requests.filter(r=>r.status==='pending');let h=`<div class="page-header"><h1>Jadual & HR</h1></div><div class="tabs"><button class="tab ${jadualTab==='jadual'?'active':''}" onclick="switchJadualTab('jadual')">Jadual</button><button class="tab ${jadualTab==='permohonan'?'active':''}" onclick="switchJadualTab('permohonan')">Permohonan${pend.length>0?' 🔴':''}</button>${isOwner()?`<button class="tab ${jadualTab==='payroll'?'active':''}" onclick="switchJadualTab('payroll')">Payroll</button>`:''}</div>`;
if(jadualTab==='jadual'){h+=`<div class="alert info"><div>ℹ️</div><div class="alert-text"><strong>Jadual mingguan</strong>Guna app jadual asal untuk manage jadual.</div></div><a href="https://abbyajichin-afk.github.io/?v=3" target="_blank"><button class="btn btn-blue" style="width:100%">📅 Buka App Jadual</button></a>`;}
else if(jadualTab==='permohonan'){if(!isOwner())h+=`<button class="btn btn-pink" style="width:100%;margin-bottom:11px" onclick="openRequestModal()">+ Buat Permohonan</button>`;const mine=requests.filter(r=>r.requested_by===currentUser.id);const show=isOwner()?requests:mine;if(!show.length)h+=`<div class="empty-state"><div class="icon">📋</div><p>Tiada permohonan</p></div>`;else h+=show.map(r=>`<div class="order-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px"><div><div style="font-weight:700;font-size:0.86rem">${r.request_type==='cuti'?'🏖️ Cuti':'💵 Advance'} — ${r.mm_users?.name||'—'}</div><div style="font-size:0.7rem;color:var(--muted)">${new Date(r.created_at).toLocaleDateString('ms-MY')}</div></div><span class="order-status status-${r.status}">${r.status.toUpperCase()}</span></div>${r.request_type==='cuti'?`<div style="font-size:0.78rem">Tarikh: ${r.leave_start||'—'} → ${r.leave_end||'—'} (${r.leave_days||'?'} hari)</div>`:`<div style="font-size:0.78rem">Jumlah: RM ${parseFloat(r.advance_amount||0).toFixed(2)}</div>`}${r.reason?`<div style="font-size:0.76rem;color:var(--muted);margin-top:2px">${r.reason}</div>`:''}${isOwner()&&r.status==='pending'?`<div class="btn-row" style="margin-top:7px"><button class="btn btn-green btn-sm" onclick="reviewRequest('${r.id}','approved')">Lulus</button><button class="btn btn-red btn-sm" onclick="reviewRequest('${r.id}','rejected')">Tolak</button></div>`:''}</div>`).join('');}
else if(jadualTab==='payroll'&&isOwner()){h+=`<button class="btn btn-pink" style="width:100%;margin-bottom:11px" onclick="openLabourModal()">+ Tambah Kos Buruh</button><div class="alert info"><div>ℹ️</div><div class="alert-text">Kos buruh akan masuk dalam P&L Dashboard.</div></div>`;}

// SEARCHABLE ITEM PICKER — replaces long flat <select> for recipe ingredients
function itemPickerHTML(cls, selectedId) {
  const sel = allItems.find(i => i.id === selectedId);
  const disp = sel ? `${sel.name} (${sel.unit})` : '';
  return `<div class="item-picker">
    <input type="text" class="item-picker-search" placeholder="🔍 Cari bahan..." value="${disp}" oninput="filterItemPicker(this)" onfocus="filterItemPicker(this)" onblur="hideItemPickerDD(this)">
    <input type="hidden" class="${cls}" value="${selectedId || ''}">
    <div class="item-picker-dropdown" style="display:none;"></div>
  </div>`;
}
function filterItemPicker(inputEl) {
  const wrap = inputEl.closest('.item-picker');
  const dd = wrap.querySelector('.item-picker-dropdown');
  const q = inputEl.value.trim().toLowerCase();
  let results = q ? allItems.filter(i => i.name.toLowerCase().includes(q)) : allItems;
  results = results.slice(0, 60);
  if (!results.length) {
    dd.innerHTML = `<div style="padding:10px;color:var(--muted);font-size:0.78rem;">Tiada padanan</div>`;
  } else {
    const groups = {};
    results.forEach(i => { const cat = CAT_LABELS[i.category] || i.category || 'Lain-lain'; (groups[cat] = groups[cat] || []).push(i); });
    dd.innerHTML = Object.entries(groups).map(([cat, arr]) => `
      <div class="item-picker-cat">${cat}</div>
      ${arr.map(i => `<div class="item-picker-option" onmousedown="event.preventDefault();pickItemPicker(this,'${i.id}','${i.name.replace(/'/g,"\\'")} (${i.unit})')">${i.name} <span style="color:var(--muted);font-size:0.7rem;">(${i.unit})</span></div>`).join('')}
    `).join('');
  }
  dd.style.display = 'block';
}
function pickItemPicker(el, id, label) {
  const wrap = el.closest('.item-picker');
  wrap.querySelector('.item-picker-search').value = label;
  wrap.querySelector('input[type="hidden"]').value = id;
  wrap.querySelector('.item-picker-dropdown').style.display = 'none';
}
function hideItemPickerDD(inputEl) {
  setTimeout(() => {
    const wrap = inputEl.closest('.item-picker');
    const dd = wrap?.querySelector('.item-picker-dropdown');
    if (dd) dd.style.display = 'none';
  }, 180);
}

async function saveEditRecipe(id) {
  const name = document.getElementById('er_name').value.trim();
  const cat = document.getElementById('er_cat').value;
  const sub = document.getElementById('er_sub').value;
  const acc = document.getElementById('er_acc').value;
  const ya = parseFloat(document.getElementById('er_yield').value)||0;
  const yu = document.getElementById('er_yu').value.trim();
  const notes = document.getElementById('er_notes').value;
  if (!name) return showToast('Nama wajib', 'error');
  const lines = [];
  document.querySelectorAll('#er_lines .line-row').forEach(row => {
    const iid = row.querySelector('.er_item').value;
    const q = parseFloat(row.querySelector('.er_qty').value)||0;
    if (!iid||!q) return;
    const item = allItems.find(i=>i.id===iid);
    lines.push({ inventory_item_id: iid, quantity: q, unit: item?.unit||'unit', recipe_id: id });
  });
  await sb.from('mm_recipes').update({ name, category: cat, subcategory: sub, access_level: acc, batch_yield: ya, batch_yield_unit: yu, notes, updated_at: new Date().toISOString() }).eq('id', id);
  await sb.from('mm_recipe_items').delete().eq('recipe_id', id);
  if (lines.length) await sb.from('mm_recipe_items').insert(lines);
  showToast('Resipi dikemaskini!', 'success');
  closeModal(); renderRecipe();
}

async function setActiveRecipe(recipeId, category, subcategory) {
  // Deactivate all same category+subcategory recipes
  await sb.from('mm_recipes').update({ is_active: false }).eq('category', category).eq('subcategory', subcategory);
  // Activate this one
  await sb.from('mm_recipes').update({ is_active: true }).eq('id', recipeId);
  showToast('Recipe diset sebagai aktif!', 'success');
  renderRecipe();
}

async function generatePL(){const month=parseInt(document.getElementById('pl_month').value);const year=parseInt(document.getElementById('pl_year').value);const result=document.getElementById('pl_result');result.innerHTML='<div class="loading">Mengira P&L...</div>';const s=`${year}-${String(month).padStart(2,'0')}-01`;const e=new Date(year,month,0).toISOString().split('T')[0];const[{data:sales},{data:batches},{data:op},{data:lb},{data:petty}]=await Promise.all([sb.from('mm_sales_daily').select('*').gte('sale_date',s).lte('sale_date',e),sb.from('mm_mochi_batches').select('*').gte('batch_date',s).lte('batch_date',e),sb.from('mm_operation_costs').select('*').eq('period_month',month).eq('period_year',year),sb.from('mm_labour_costs').select('*').eq('period_month',month).eq('period_year',year),sb.from('mm_petty_cash').select('*').eq('type','keluar')]);
const rev=(sales||[]).reduce((s,r)=>s+(r.total_amount||0),0);const fc=(batches||[]).reduce((s,b)=>s+(b.filling_cost||0),0);const rc=(batches||[]).reduce((s,b)=>s+(b.raw_mat_cost||0),0);const cogs=fc+rc;const gp=rev-cogs;const opex=(op||[]).reduce((s,c)=>s+(c.amount||0),0);const lab=(lb||[]).reduce((s,l)=>s+(l.total_pay||0),0);const pm=(petty||[]).filter(p=>{const d=new Date(p.created_at);return d.getMonth()+1===month&&d.getFullYear()===year;}).reduce((s,p)=>s+(p.amount||0),0);const totalOpex=opex+lab+pm;const net=gp-totalOpex;const mn=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
result.innerHTML=`<div class="card"><div class="card-title">P&L Statement — ${mn[month-1]} ${year}</div><div class="pl-section-title">📈 PENDAPATAN</div><div class="pl-row"><span>Jualan Mochi</span><span>RM ${rev.toLocaleString('ms-MY',{minimumFractionDigits:2})}</span></div><div class="pl-row total"><span>JUMLAH PENDAPATAN</span><span>RM ${rev.toLocaleString('ms-MY',{minimumFractionDigits:2})}</span></div><div class="pl-section-title">🏭 KOS JUALAN (COGS)</div><div class="pl-row"><span>Kos Filling</span><span>RM ${fc.toFixed(2)}</span></div><div class="pl-row"><span>Kos Raw Material</span><span>RM ${rc.toFixed(2)}</span></div><div class="pl-row total"><span>JUMLAH COGS</span><span>RM ${cogs.toFixed(2)}</span></div><div class="pl-row ${gp>=0?'profit':'loss'}"><span>UNTUNG KASAR</span><span>RM ${gp.toLocaleString('ms-MY',{minimumFractionDigits:2})}</span></div><div class="pl-section-title">💸 KOS OPERASI (OPEX)</div><div class="pl-row"><span>Kos Operasi</span><span>RM ${opex.toFixed(2)}</span></div><div class="pl-row"><span>Gaji & Buruh</span><span>RM ${lab.toFixed(2)}</span></div><div class="pl-row"><span>Petty Cash</span><span>RM ${pm.toFixed(2)}</span></div><div class="pl-row total"><span>JUMLAH OPEX</span><span>RM ${totalOpex.toFixed(2)}</span></div><div class="pl-highlight" style="background:${net>=0?'linear-gradient(135deg,var(--green),#1e8449)':'linear-gradient(135deg,var(--red),#c0392b)'};color:white"><div class="lbl">${net>=0?'UNTUNG BERSIH':'RUGI BERSIH'}</div><div class="big">RM ${Math.abs(net).toLocaleString('ms-MY',{minimumFractionDigits:2})}</div><div class="lbl">${mn[month-1]} ${year}</div></div></div>`;}

// Get week start (Monday)
function getWeekStart(date) {
  const d = date || new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().split('T')[0];
}

function getWeekDatesInt(weekStart) {
  const dates = [];
  const start = new Date(weekStart + 'T00:00:00');
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    dates.push({
      date: d.toISOString().split('T')[0],
      key: DELIVERY_DAYS_INT[i].key,
      label: DELIVERY_DAYS_INT[i].ms,
      short: DELIVERY_DAYS_INT[i].short,
    });
  }
  return dates;
}

function fmtDateShortInt(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('ms-MY', {day: 'numeric', month: 'short'});
}

// Save/load booth orders
async function saveBoothOrder(boothId, weekStart, data) {
  await sb.from('mm_internal_order_items').delete().eq('order_id', boothId + '_' + weekStart);
  const { data: existing } = await sb.from('mm_internal_orders').select('id').eq('order_no', boothId + '_' + weekStart).single();
  if (existing) {
    await sb.from('mm_internal_orders').update({ notes: JSON.stringify(data), order_date: weekStart }).eq('order_no', boothId + '_' + weekStart);
  } else {
    await sb.from('mm_internal_orders').insert({ order_no: boothId + '_' + weekStart, requested_by: currentUser.id, status: 'confirmed', notes: JSON.stringify(data), order_date: weekStart });
  }
  // Audit log — record who/when changed this order + full snapshot
  await sb.from('mm_order_audit_log').insert({
    order_no: boothId + '_' + weekStart,
    booth_id: boothId,
    week_start: weekStart,
    changed_by: currentUser.id,
    changed_by_name: currentUser.name,
    snapshot: data
  });
}

async function loadBoothOrder(boothId, weekStart) {
  const { data } = await sb.from('mm_internal_orders').select('notes').eq('order_no', boothId + '_' + weekStart).single();
  if (data?.notes) { try { return JSON.parse(data.notes); } catch(e) { return null; } }
  return null;
}

async function loadAllBoothOrders(weekStart) {
  const { data } = await sb.from('mm_internal_orders').select('order_no, notes').like('order_no', '%_' + weekStart);
  if (!data) return [];
  return data.map(d => {
    try { return { boothId: d.order_no.replace('_' + weekStart, ''), ...JSON.parse(d.notes) }; } catch(e) { return null; }
  }).filter(Boolean);
}

// Save booths to Supabase
async function saveBooths() {
  await sb.from('mm_internal_orders').upsert({ order_no: 'config_booths', notes: JSON.stringify(booths), requested_by: currentUser.id, status: 'confirmed', order_date: new Date().toISOString().split('T')[0] });
}

async function loadBooths() {
  const { data } = await sb.from('mm_internal_orders').select('notes').eq('order_no', 'config_booths').single();
  if (data?.notes) { try { booths = JSON.parse(data.notes); } catch(e) {} }
}

// FLAVOUR ENABLE/DISABLE STATE
let flavourStatusMap = {};
async function loadFlavourStatus() {
  const { data } = await sb.from('mm_flavour_status').select('*');
  flavourStatusMap = {};
  (data || []).forEach(r => { flavourStatusMap[r.flavour_type + '|' + r.flavour_name] = r.active; });
}
function isFlavourActive(type, name) {
  const key = type + '|' + name;
  return flavourStatusMap.hasOwnProperty(key) ? flavourStatusMap[key] : true;
}
async function toggleFlavourStatus(type, name, current) {
  const newActive = !current;
  const { error } = await sb.from('mm_flavour_status').upsert(
    { flavour_type: type, flavour_name: name, active: newActive, updated_at: new Date().toISOString() },
    { onConflict: 'flavour_type,flavour_name' }
  );
  if (error) return showToast('Gagal simpan', 'error');
  showToast(newActive ? 'Flavour diaktifkan ✅' : 'Flavour dinyahaktifkan ❌', 'success');
  renderSetup();
}
async function renderFlavourSetup() {
  await loadFlavourStatus();
  const rowsFor = (list, type) => list.map(f => {
    const active = isFlavourActive(type, f.name);
    const safeName = f.name.replace(/'/g, "\\'");
    return `<div class="list-item">
      <div class="list-item-info"><div class="list-item-name" style="${active?'':'opacity:0.45;text-decoration:line-through;'}">${f.name}</div></div>
      <button class="btn btn-xs ${active?'btn-outline':'btn-red'}" onclick="toggleFlavourStatus('${type}','${safeName}',${active})">${active?'✅ Aktif':'❌ Off'}</button>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-title">🍡 Flavour — Daifuku</div>${rowsFor(DAIFUKU_FLAVOURS,'daifuku')}</div>
  <div class="card"><div class="card-title">📦 Flavour — Mochi Bites</div>${rowsFor(BITES_FLAVOURS,'bites')}</div>`;
}

              const total = i.quantity * batches;
              html += `<div class="list-item" style="cursor:default;">
                <div class="list-item-info"><div class="list-item-name">${i.mm_inventory_items?.name||'—'}</div><div class="list-item-meta">${i.quantity}${i.unit} × ${batches} batch</div></div>
                <div style="font-weight:800;color:var(--pink);">${total}${i.unit}</div>
              </div>`;
            });
          } else {
            html += `<div style="font-size:0.8rem;color:var(--muted);padding:8px;">⚠️ Tiada active recipe untuk Dough Mochi. Set active recipe dalam Resipi tab.</div>`;
          }

          if (dayTotalB > 0) {
            if (bitesRecipe && bitesRecipe.batch_yield > 0) {
              const batchesB = Math.ceil(dayTotalB / bitesRecipe.batch_yield);
              html += `<div style="background:var(--pink-pale);border-radius:8px;padding:10px 12px;margin:10px 0;">
                <div style="font-weight:700;font-size:0.88rem;">📦 Dough Bites — ${bitesRecipe.name}</div>
                <div style="font-size:0.76rem;color:var(--muted);">Total: ${dayTotalB}packs ÷ ${bitesRecipe.batch_yield}packs/batch = <strong>${batchesB} bancuhan</strong></div>
              </div>`;
              (bitesRecipe.mm_recipe_items||[]).forEach(i => {
                const total = i.quantity * batchesB;
                html += `<div class="list-item" style="cursor:default;">
                  <div class="list-item-info"><div class="list-item-name">${i.mm_inventory_items?.name||'—'}</div><div class="list-item-meta">${i.quantity}${i.unit} × ${batchesB} batch</div></div>
                  <div style="font-weight:800;color:var(--pink);">${total}${i.unit}</div>
                </div>`;
              });
            } else {
              html += `<div style="font-size:0.8rem;color:var(--muted);padding:8px 0;">⚠️ Tiada active recipe untuk Dough Bites.</div>`;
            }
          }
          html += `</div>`;
        }
      }
    }
  } else if (prodOrderTab === 'history') {
    // ORDER HISTORY — past weeks per booth + who/when changed
    html += `<div class="card">
      <div class="card-title">Pilih Booth</div>
      <select class="form-select" onchange="prodOrderBooth=this.value;renderProdOrder()">
        ${booths.map(b=>`<option value="${b.id}" ${b.id===prodOrderBooth?'selected':''}>${b.name}</option>`).join('')}
      </select>
    </div>`;

    const { data: logs } = await sb.from('mm_order_audit_log').select('*').eq('booth_id', prodOrderBooth).order('changed_at', { ascending: false }).limit(50);

    if (!logs || !logs.length) {
      html += `<div class="empty-state"><div class="icon">📜</div><p>Tiada sejarah order untuk booth ini.</p></div>`;
    } else {
      html += `<div class="card"><div class="card-title">📜 Sejarah Perubahan (${logs.length})</div>`;
      logs.forEach(l => {
        let totalD = 0, totalB = 0;
        const snap = l.snapshot || {};
        DAIFUKU_FLAVOURS.forEach(f => { Object.values(snap.daifuku?.[f.name] || {}).forEach(q => totalD += (q || 0)); });
        BITES_FLAVOURS.forEach(f => { Object.values(snap.bites?.[f.name] || {}).forEach(q => totalB += (q || 0)); });
        const changedDate = l.changed_at ? new Date(l.changed_at).toLocaleString('ms-MY', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
        html += `<div class="list-item" style="cursor:default;flex-direction:column;align-items:flex-start;gap:2px;">
          <div style="display:flex;justify-content:space-between;width:100%;">
            <div class="list-item-name">📅 Minggu ${l.week_start}</div>
            <div style="font-size:0.7rem;color:var(--muted);">${changedDate}</div>
          </div>
          <div style="font-size:0.76rem;color:var(--muted);">👤 ${l.changed_by_name || '—'} • 🍡 ${totalD}pcs • 📦 ${totalB}pack</div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  c.innerHTML = html;
}

function switchProdOrderTab(tab) { prodOrderTab = tab; renderProdOrder(); }

let _boothOrderCache = {};

async function toggleBoothOffDay(dayKey) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  if (!window._currentBoothOrder.offDays) window._currentBoothOrder.offDays = {};
  window._currentBoothOrder.offDays[dayKey] = !window._currentBoothOrder.offDays[dayKey];
  if (window._currentBoothWeek && window._currentBoothId) {
    await saveBoothOrder(window._currentBoothId, window._currentBoothWeek, window._currentBoothOrder);
  }
  renderProdOrder();
}

function switchDayTab(dayKey) {
  document.querySelectorAll('[id^="dayPanel_"]').forEach(p => p.style.display = 'none');
  document.querySelectorAll('[id^="dtab_"]').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('dayPanel_' + dayKey);
  const tab = document.getElementById('dtab_' + dayKey);
  if (panel) panel.style.display = 'block';
  if (tab) tab.classList.add('active');
}

function adjQty(elId, type, flavour, dayKey, delta) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const data = type === 'daifuku' ? window._currentBoothOrder.daifuku : window._currentBoothOrder.bites;
  if (!data[flavour]) data[flavour] = {};
  const cur = data[flavour][dayKey] !== undefined ? data[flavour][dayKey] : 5;
  const newVal = Math.max(0, cur + delta);
  data[flavour][dayKey] = newVal;
  const el = document.getElementById(elId);
  if (el) el.value = newVal;
  updateDayTotal(dayKey);
}

function setQtyDirect(elId, type, flavour, dayKey) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const data = type === 'daifuku' ? window._currentBoothOrder.daifuku : window._currentBoothOrder.bites;
  if (!data[flavour]) data[flavour] = {};
  const el = document.getElementById(elId);
  if (el) data[flavour][dayKey] = Math.max(0, parseInt(el.value) || 0);
  updateDayTotal(dayKey);
}

function adjBitesTotal(elId, dayKey, delta) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bitesTotal: {} };
  if (!window._currentBoothOrder.bitesTotal) window._currentBoothOrder.bitesTotal = {};
  const cur = window._currentBoothOrder.bitesTotal[dayKey] !== undefined ? window._currentBoothOrder.bitesTotal[dayKey] : 40;
  const newVal = Math.max(0, cur + delta);
  window._currentBoothOrder.bitesTotal[dayKey] = newVal;
  const el = document.getElementById(elId);
  if (el) el.value = newVal;
  updateDayTotal(dayKey);
}

function setBitesTotalDirect(elId, dayKey) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bitesTotal: {} };
  if (!window._currentBoothOrder.bitesTotal) window._currentBoothOrder.bitesTotal = {};
  const el = document.getElementById(elId);
  if (el) window._currentBoothOrder.bitesTotal[dayKey] = Math.max(0, parseInt(el.value) || 0);
  updateDayTotal(dayKey);
}

function updateDayTotal(dayKey) {
  if (!window._currentBoothOrder) return;
  const orderData = window._currentBoothOrder;
  let totalD = 0;
  DAIFUKU_FLAVOURS.forEach(f => { if (isFlavourActive('daifuku', f.name)) totalD += (orderData.daifuku?.[f.name]?.[dayKey] ?? 5); });
  const totalB = orderData.bitesTotal?.[dayKey] ?? 40;
  const elD = document.getElementById(`dtTotalD_${dayKey}`);
  const elB = document.getElementById(`dtTotalB_${dayKey}`);
  if (elD) elD.textContent = totalD;
  if (elB) elB.textContent = totalB;
}

function setDefaultQty() {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bitesTotal: {} };
  const weekDates = getWeekDatesInt(window._currentBoothWeek || getWeekStart());
  DAIFUKU_FLAVOURS.forEach(f => {
    if (!window._currentBoothOrder.daifuku[f.name]) window._currentBoothOrder.daifuku[f.name] = {};
    weekDates.forEach(({key}) => {
      if (!window._currentBoothOrder.offDays?.[key]) {
        window._currentBoothOrder.daifuku[f.name][key] = 5;
      }
    });
  });
  if (!window._currentBoothOrder.bitesTotal) window._currentBoothOrder.bitesTotal = {};
  weekDates.forEach(({key}) => {
    if (!window._currentBoothOrder.offDays?.[key]) {
      window._currentBoothOrder.bitesTotal[key] = 40;
    }
  });
  showToast('Default 5pcs diset untuk semua!', 'success');
  renderProdOrder();
}

function openCopyFromDateModal() {
  showModal('Copy dari Tarikh Lain', `
    <div class="form-group"><label class="form-label">Pilih Tarikh</label>
      <input class="form-input" id="cfd_date" type="date" value="${new Date(Date.now()-86400000).toISOString().split('T')[0]}">
    </div>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:12px;">System akan copy quantity dari tarikh yang dipilih ke semua hari dalam minggu semasa.</p>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-pink" onclick="copyFromDate()">Copy</button>
    </div>`);
}

async function copyFromDate() {
  const date = document.getElementById('cfd_date').value;
  if (!date) return showToast('Pilih tarikh', 'error');
  // Find which week this date belongs to
  const weekStart = getWeekStart(new Date(date + 'T00:00:00'));
  const dayOfWeek = new Date(date + 'T00:00:00').getDay();
  const dayKey = DELIVERY_DAYS_INT[dayOfWeek === 0 ? 6 : dayOfWeek - 1].key;
  // Load that booth's order for that week
  const sourceOrder = await loadBoothOrder(window._currentBoothId, weekStart);
  if (!sourceOrder) return showToast('Tiada order untuk tarikh ini', 'error');
  // Copy qty from that day to all active days in current week
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bitesTotal: {} };
  const weekDates = getWeekDatesInt(window._currentBoothWeek || getWeekStart());
  DAIFUKU_FLAVOURS.forEach(f => {
    const qty = sourceOrder.daifuku?.[f.name]?.[dayKey] ?? 5;
    if (!window._currentBoothOrder.daifuku[f.name]) window._currentBoothOrder.daifuku[f.name] = {};
    weekDates.forEach(({key}) => {
      if (!window._currentBoothOrder.offDays?.[key]) window._currentBoothOrder.daifuku[f.name][key] = qty;
    });
  });
  if (!window._currentBoothOrder.bitesTotal) window._currentBoothOrder.bitesTotal = {};
  const bqty = sourceOrder.bitesTotal?.[dayKey] ?? 40;
  weekDates.forEach(({key}) => {
    if (!window._currentBoothOrder.offDays?.[key]) window._currentBoothOrder.bitesTotal[key] = bqty;
  });
  showToast('Order berjaya di-copy!', 'success');
  closeModal();
  renderProdOrder();
}

function changeBoothQty(type, flavour, dayKey, delta) {
  if (!window._currentBoothOrder) window._currentBoothOrder = { offDays: {}, daifuku: {}, bites: {} };
  const data = type === 'daifuku' ? window._currentBoothOrder.daifuku : window._currentBoothOrder.bites;
  if (!data[flavour]) data[flavour] = {};
  const cur = data[flavour][dayKey] || 0;
  const newVal = Math.max(0, cur + delta);
  data[flavour][dayKey] = newVal;

  // Update display
  const sid = `q_${type==='daifuku'?'d':'b'}_${flavour.replace(/[^a-z0-9]/gi,'_')}_${dayKey}`;
  const el = document.getElementById(sid);
  if (el) el.textContent = newVal;

  // Update week total
  const weekStart = window._currentBoothWeek;
  const weekDates = getWeekDatesInt(weekStart);
  let weekTotal = 0;
  weekDates.forEach(({key}) => {
    if (!window._currentBoothOrder.offDays?.[key]) weekTotal += data[flavour][key] || 0;
  });
  const tid = `ft_${type}_${flavour.replace(/\s/g,'_')}`;
  const tel = document.getElementById(tid);
  if (tel) tel.textContent = weekTotal + (type==='daifuku'?' pcs':' pack');
}

async function saveCurrentBoothOrder() {
  const order = window._currentBoothOrder;
  const weekStart = window._currentBoothWeek;
  const boothId = window._currentBoothId;
  if (!order || !weekStart || !boothId) return showToast('Error: data tidak lengkap', 'error');
  await saveBoothOrder(boothId, weekStart, order);
  showToast('Order disimpan! 🎉', 'success');
}

// Booth management for Setup
async function renderBoothSetup() {
  await loadBooths();
  return `<div class="card">
    <div class="section-header"><h3>🏪 Booth Management</h3><button class="btn btn-sm btn-pink" onclick="openAddBoothModal()">+ Tambah</button></div>
    ${booths.map((b,i) => `
      <div class="list-item">
        <div class="list-item-info"><div class="list-item-name">${b.name}</div></div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-xs btn-outline" onclick="openEditBoothModal(${i})">Edit</button>
          <button class="btn btn-xs btn-red" onclick="removeBooth(${i})">Buang</button>
        </div>
      </div>`).join('')}
  </div>`;
}

function openAddBoothModal() {
  showModal('Tambah Booth', `
    <div class="form-group"><label class="form-label">Nama Booth</label><input class="form-input" id="nb_name" placeholder="e.g. Booth Shah Alam"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-pink" onclick="saveNewBooth()">Simpan</button>
    </div>`);
}

async function saveNewBooth() {
  const name = document.getElementById('nb_name').value.trim();
  if (!name) return showToast('Nama wajib', 'error');
  booths.push({ id: 'booth_' + Date.now(), name });
  await saveBooths();
  showToast('Booth ditambah!', 'success');
  closeModal();
  renderSetup();
}

function openEditBoothModal(idx) {
  const booth = booths[idx];
  showModal('Edit Booth', `
    <div class="form-group"><label class="form-label">Nama Booth</label><input class="form-input" id="eb_name" value="${booth.name}"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-pink" onclick="saveEditBooth(${idx})">Simpan</button>
    </div>`);
}

async function saveEditBooth(idx) {
  const name = document.getElementById('eb_name').value.trim();
  if (!name) return showToast('Nama wajib', 'error');
  booths[idx].name = name;
  await saveBooths();
  showToast('Booth dikemaskini!', 'success');
  closeModal();
  renderSetup();
}

async function removeBooth(idx) {
  if (!confirm(`Buang "${booths[idx].name}"?`)) return;
  booths.splice(idx, 1);
  await saveBooths();
  showToast('Booth dibuang!', 'success');
  renderSetup();
}
